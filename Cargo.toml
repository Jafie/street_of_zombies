[package]
name = "street_of_zombies"
version = "0.1.0"
authors = ["Jafie <fortun.axel@gmail.com>"]
edition = "2021"
resolver = "2"

[profile.release]
lto = "thin"
opt-level = 's'

[features]
default = [
  "bevy/bevy_gltf",
  "bevy/png",
]

native = [
  "bevy/bevy_winit",
]

web = [
  "bevy/bevy_winit",
]

[dependencies]
rand = "0.8"
getrandom = { version = "0.2", features = ["wasm-bindgen"] }
instant  = "0.1.9"
bevy = "0.15.0"
